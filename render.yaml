services:
  - type: web
    name: stream-chat-summary
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 1 --threads 4 --bind 0.0.0.0:$PORT
    envVars:
      - key: ADMIN_PASSWORD
        value: changeme123
      - key: SECRET_KEY
        generateValue: true
